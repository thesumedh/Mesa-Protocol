name: Mesa Protocol CI

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  build-and-test:
    name: Build & Unit Tests (Mandatory)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Build SDK
      run: npm run build --workspace=packages/mesa-sdk

    - name: Build CLI
      run: npm run build --workspace=packages/mesa-cli

    - name: Run Indexer Unit Tests
      run: npm run test --workspace=packages/mesa-indexer

    - name: Build Next.js Sandbox Application
      run: npm run build --workspace=sandbox-run

  testnet-e2e:
    name: On-Chain Testnet Integration Tests (Optional)
    needs: build-and-test
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Build SDK
      run: npm run build --workspace=packages/mesa-sdk

    - name: Run On-Chain Testnet Integration Test
      run: npm run test:e2e
