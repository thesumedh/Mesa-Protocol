<!DOCTYPE html>

    <meta charset="utf-8"/>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <!-- Stellar SDK (UMD) → window.StellarSdk -->
    <script src="https://unpkg.com/@stellar/stellar-sdk@12.2.0/dist/stellar-sdk.min.js" crossorigin="anonymous"></script>

    <!-- Local Freighter browser bundle. Exposes window.freighterApi when loaded. -->
    <script src="js/freighter-api.min.js?v=1" crossorigin="anonymous"></script>

    <!--
      @stellar/freighter-api loaded as ES Module via esm.sh.
      This uses window.postMessage to communicate with the installed Freighter extension
      — works even when the extension does NOT inject window.freighter.
    -->
    <script type="module">
      try {
        const { isConnected, isAllowed, setAllowed, requestAccess, getAddress, signTransaction, getNetwork }
          = await import('https://esm.sh/@stellar/freighter-api@2');
        // Expose on window so the non-module mesa-sdk.js can reach it
        window.FreighterAPI = { isConnected, isAllowed, setAllowed, requestAccess, getAddress, signTransaction, getNetwork };
        console.log('[Mesa] Freighter API loaded via esm.sh');
      } catch(e) {
        if (window.freighterApi) {
          window.FreighterAPI = window.freighterApi;
          console.log('[Mesa] Freighter API loaded via local fallback');
        } else {
          console.warn('[Mesa] Freighter API load failed', e);
        }
      }
    </script>

    <!-- Single Page Router and Script Injector -->
    <script>
        const routes = {
            '#dashboard':       'welcome_dashboard/code.html',
            '#circle':          'group_savings_room/code.html',
            '#create-circle':   'create_a_circle_wizard/code.html',
            '#fiat':            'fiat_on_off_ramp/code.html',
            '#governance':      'governance_overview/code.html',
            '#create-proposal': 'create_proposal_wizard/code.html',
            '#review-proposal': 'create_proposal_review_step/code.html',
            '#success-proposal':'proposal_submission_success/code.html',
            '#proposal-detail': 'proposal_detail_view/code.html',
            '#social':          'social_feed_preview/code.html',
            '#twitter':         'twitter_x_feed_preview/code.html'
        };

        const topLoadingBar = document.getElementById('top-loading-bar');
        const appContent = document.getElementById('app-content');

        // Handles dynamic fetching and parsing of target components
        async function handleRoute() {
            const hash = window.location.hash || '#dashboard';
            const pagePath = routes[hash];
            
            if (!pagePath) {
                appContent.innerHTML = `<div class="p-xl text-center"><h2 class="text-xl font-bold">Route not found</h2><p class="text-on-surface-variant mt-sm">Click <a href="#dashboard" class="text-secondary font-bold">here</a> to go home.</p></div>`;
                return;
            }

            // Start top loading bar
            topLoadingBar.style.opacity = '1';
            topLoadingBar.style.width = '30%';

            // Update navigation highlights
            updateNavActiveState(hash);

            try {
                const response = await fetch(pagePath);
                if (!response.ok) throw new Error(`Failed to load ${pagePath}`);
                
                topLoadingBar.style.width = '70%';
                const htmlText = await response.text();

                // Parse the fetched HTML page
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlText, 'text/html');

                // Get inner HTML of <main>
                const mainEl = doc.querySelector('main');
                if (!mainEl) throw new Error('No main element found in the loaded page');

                // Strip margin offsets from subcomponent main tags to render clean in the SPA container
                let mainContent = mainEl.innerHTML;
                
                // Clear out previous script & style injections
                document.querySelectorAll('.page-style').forEach(el => el.remove());
                document.querySelectorAll('.page-script').forEach(el => el.remove());

                // Inject sub-page styles
                doc.querySelectorAll('style').forEach(style => {
                    const newStyle = document.createElement('style');
                    newStyle.className = 'page-style';
                    newStyle.textContent = style.textContent;
                    document.head.appendChild(newStyle);
                });

                // Set content and trigger fade-in transition
                appContent.innerHTML = '';
                
                // Create a clean main tag using the sub-page's classes (but stripped of offsets)
                const newMain = document.createElement('main');
                let classes = mainEl.className;
                classes = classes.replace(/\blg:ml-64\b/g, '')
                                 .replace(/\blg:pl-64\b/g, '')
                                 .replace(/\bpt-24\b/g, '')
                                 .replace(/\bpt-32\b/g, '');
                
                newMain.className = classes + " px-gutter py-md max-w-[1200px] mx-auto";
                newMain.innerHTML = mainContent;

                appContent.appendChild(newMain);

                // If page has a footer, append it
                const footerEl = doc.querySelector('footer');
                if (footerEl) {
                    const newFooter = document.createElement('footer');
                    let footerClasses = footerEl.className;
                    footerClasses = footerClasses.replace(/\blg:ml-64\b/g, '').replace(/\blg:pl-64\b/g, '');
                    newFooter.className = footerClasses;
                    newFooter.innerHTML = footerEl.innerHTML;
                    appContent.appendChild(newFooter);
                }

                // Smoothly finish top progress bar
                topLoadingBar.style.width = '100%';
                setTimeout(() => {
                    topLoadingBar.style.opacity = '0';
                    setTimeout(() => { topLoadingBar.style.width = '0%'; }, 400);
                }, 300);

                // Inject and execute sub-page scripts
                doc.querySelectorAll('script').forEach(script => {
                    if (script.id === 'tailwind-config') return;
                    
                    const newScript = document.createElement('script');
                    newScript.className = 'page-script';
                    
                    if (script.src) {
                        newScript.src = script.src;
                    } else {
                        const code = script.textContent;
                        // Subpages are injected after the initial load event, so replay load hooks
                        // without rewriting the user's script text with brittle regexes.
                        newScript.textContent = [
                            '(function(){',
                            'const __docAdd = document.addEventListener.bind(document);',
                            'const __winAdd = window.addEventListener.bind(window);',
                            'document.addEventListener = function(type, listener, options) {',
                            '  if (type === "DOMContentLoaded" && typeof listener === "function") {',
                            '    queueMicrotask(() => listener.call(document, new Event("DOMContentLoaded")));',
                            '    return;',
                            '  }',
                            '  return __docAdd(type, listener, options);',
                            '};',
                            'window.addEventListener = function(type, listener, options) {',
                            '  if (type === "load" && typeof listener === "function") {',
                            '    queueMicrotask(() => listener.call(window, new Event("load")));',
                            '    return;',
                            '  }',
                            '  return __winAdd(type, listener, options);',
                            '};',
                            'try {',
                            code,
                            '} finally {',
                            '  document.addEventListener = __docAdd;',
                            '  window.addEventListener = __winAdd;',
                            '}',
                            '})();',
                        ].join('\n');
                    }
                    document.body.appendChild(newScript);
                });

                // Scroll to top
                window.scrollTo({ top: 0, behavior: 'instant' });

            } catch (error) {
                console.error(error);
                appContent.innerHTML = `<div class="p-xl text-center text-error"><h2 class="text-xl font-bold">Failed to load content</h2><p class="mt-sm">${error.message}</p></div>`;
                topLoadingBar.style.opacity = '0';
            }
        }

        // Active layout indicator toggler
        function updateNavActiveState(hash) {
            // Remove active classes
            const navIds = ['nav-dashboard', 'nav-circle', 'nav-social', 'nav-governance', 'nav-fiat'];
            navIds.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.className = 'flex items-center gap-md px-md py-sm rounded-lg text-on-surface-variant hover:bg-surface-container-low transition-all';
                }
            });

            const mobileIds = ['mobile-nav-dashboard', 'mobile-nav-circle', 'mobile-nav-social', 'mobile-nav-governance', 'mobile-nav-fiat'];
            mobileIds.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.className = 'flex flex-col items-center gap-xs text-on-surface-variant';
                }
            });

            // Match current hash to sidebar target
            let activeId = 'nav-dashboard';
            let activeMobileId = 'mobile-nav-dashboard';

            if (hash === '#circle' || hash === '#create-circle') {
                activeId = 'nav-circle';
                activeMobileId = 'mobile-nav-circle';
            } else if (hash === '#social' || hash === '#twitter') {
                activeId = 'nav-social';
                activeMobileId = 'mobile-nav-social';
            } else if (hash.startsWith('#governance') || hash === '#create-proposal' || hash === '#review-proposal' || hash === '#success-proposal' || hash === '#proposal-detail') {
                activeId = 'nav-governance';
                activeMobileId = 'mobile-nav-governance';
            } else if (hash === '#fiat') {
                activeId = 'nav-fiat';
                activeMobileId = 'mobile-nav-fiat';
            }

            const activeEl = document.getElementById(activeId);
            if (activeEl) {
                activeEl.className = 'flex items-center gap-md px-md py-sm rounded-lg bg-secondary-container text-on-secondary-container font-bold shadow-sm transition-all';
            }

            const activeMobileEl = document.getElementById(activeMobileId);
            if (activeMobileEl) {
                activeMobileEl.className = 'flex flex-col items-center gap-xs text-secondary font-bold';
            }
        }

        // Intercept global clicks on links and buttons to map routes dynamically
        document.addEventListener('click', (e) => {
            const target = e.target.closest('a, button');
            if (!target) return;
            
            const text = target.textContent.trim().toLowerCase();
            
            // Prevent default hash anchor jumps
            if (target.tagName === 'A' && target.getAttribute('href') === '#') {
                e.preventDefault();
            }

            // Route mapping rules
            if (text.includes('create new circle') || text.includes('create circle')) {
                window.location.hash = '#create-circle';
            } else if (text.includes('family tanda') || text.includes('tech chama')) {
                window.location.hash = '#circle';
            } else if (text.includes('view all') && window.location.hash === '#dashboard') {
                window.location.hash = '#circle';
            } else if (text.includes('pay now') || text.includes('pay my round') || text.includes('deposit') || text.includes('withdraw')) {
                if (window.location.hash !== '#circle') {
                    window.location.hash = '#fiat';
                }
            } else if (text.includes('create proposal') || text.includes('create new proposal')) {
                window.location.hash = '#create-proposal';
            } else if (text.includes('continue to review') || text.includes('review proposal') || text.includes('next step')) {
                if (window.location.hash === '#create-proposal') {
                    window.location.hash = '#review-proposal';
                }
            } else if (text.includes('submit proposal') || text.includes('publish') || text.includes('submit')) {
                if (window.location.hash === '#review-proposal') {
                    window.location.hash = '#success-proposal';
                }
            } else if (text.includes('view proposal in feed') || text.includes('view proposal') || text.includes('adjust minimum collateral ratio')) {
                window.location.hash = '#proposal-detail';
            } else if (text.includes('share with members') || text.includes('invite member') || text.includes('share proposal') || text.includes('share')) {
                showShareModal();
            } else if (text.includes('governance') && target.tagName === 'A') {
                window.location.hash = '#governance';
            } else if (text.includes('explore') && target.tagName === 'A') {
                window.location.hash = '#social';
            } else if (text.includes('dashboard') && target.tagName === 'A') {
                window.location.hash = '#dashboard';
            } else if (text.includes('feed') && target.tagName === 'A') {
                window.location.hash = '#social';
            }
        });

        // Dynamic share modal overlay injection
        async function showShareModal() {
            try {
                const response = await fetch('share_proposal_modal/code.html');
                const htmlText = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlText, 'text/html');
                
                const modalOverlay = doc.getElementById('share-modal-overlay');
                if (modalOverlay) {
                    // Check if already mounted
                    const existing = document.getElementById('share-modal-overlay');
                    if (existing) existing.remove();

                    // Mount to DOM
                    document.body.appendChild(modalOverlay);
                }
            } catch (err) {
                console.error("Failed to load share modal overlay: ", err);
            }
        }

        // Dark/Light Theme Switcher
        function toggleDarkMode() {
            const html = document.documentElement;
            const icon = document.getElementById('dark-mode-icon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                html.classList.add('light');
                icon.innerText = 'dark_mode';
                localStorage.theme = 'light';
            } else {
                html.classList.remove('light');
                html.classList.add('dark');
                icon.innerText = 'light_mode';
                localStorage.theme = 'dark';
            }
        }

        // Initialize state & listen for hash navigations
        window.addEventListener('hashchange', handleRoute);
        window.addEventListener('DOMContentLoaded', () => {
            // Apply storage theme if present
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                document.documentElement.classList.remove('light');
                document.getElementById('dark-mode-icon').innerText = 'light_mode';
            } else {
                document.documentElement.classList.add('light');
                document.documentElement.classList.remove('dark');
                document.getElementById('dark-mode-icon').innerText = 'dark_mode';
            }
            handleRoute();
        });

        // After each route loads, run SDK population helpers if SDK is ready
        window.addEventListener('hashchange', () => {
            setTimeout(() => {
                if (window.MesaSDK) window.MesaSDK.populateDashboard();
            }, 300);
        });
    </script>

    <!-- Mesa Protocol SDK v3 — cache-busted to force reload -->
    <script src="js/mesa-sdk.js?v=6"></script>
</body>
</html>
