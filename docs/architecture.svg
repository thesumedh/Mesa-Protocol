<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <!-- Definitions for Gradients, Shadows, and Fonts -->
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>

    <!-- Node Gradient (Premium Blue/Indigo) -->
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Highlight Gradient (Cyan/Teal) -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>

    <!-- Glow/Shadow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#6366f1" flood-opacity="0.25"/>
    </filter>
    <filter id="accentGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#06b6d4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <style>
    .label { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-size: 14px; font-weight: 600; fill: #94a3b8; }
    .title { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-size: 18px; font-weight: 700; fill: #ffffff; }
    .action-text { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-size: 12px; font-weight: 700; fill: #38bdf8; text-transform: uppercase; letter-spacing: 1px; }
    .arrow { fill: none; stroke: #475569; stroke-width: 2.5; stroke-dasharray: 6 4; }
    .arrow-head { fill: #475569; }
    .circle-label { font-family: 'Outfit', 'Inter', system-ui, sans-serif; font-size: 11px; font-weight: 700; fill: #ffffff; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGradient)" rx="16" />

  <!-- ================= USER NODE ================= -->
  <g transform="translate(60, 200)" filter="url(#glow)">
    <!-- Node Circle -->
    <circle cx="0" cy="0" r="40" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <!-- User Icon (Head & Shoulders) -->
    <circle cx="0" cy="-10" r="12" fill="#e2e8f0"/>
    <path d="M -20 18 C -20 4, 20 4, 20 18 Z" fill="#e2e8f0"/>
    <text x="0" y="60" text-anchor="middle" class="title">User</text>
  </g>

  <!-- Flow 1: Create Arrow -->
  <g>
    <path d="M 115 200 L 165 200" class="arrow" />
    <polygon points="165,195 175,200 165,205" class="arrow-head" />
    <text x="140" y="185" text-anchor="middle" class="action-text">Create</text>
  </g>

  <!-- ================= PHONE NODE ================= -->
  <g transform="translate(220, 200)" filter="url(#glow)">
    <!-- Node Circle -->
    <circle cx="0" cy="0" r="40" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <!-- Phone Icon -->
    <rect x="-14" y="-24" width="28" height="48" rx="5" fill="none" stroke="#e2e8f0" stroke-width="3"/>
    <line x1="-8" y1="-18" x2="8" y2="-18" stroke="#e2e8f0" stroke-width="2"/>
    <circle cx="0" cy="18" r="3" fill="#e2e8f0"/>
    <text x="0" y="60" text-anchor="middle" class="title">Phone</text>
  </g>

  <!-- Flow 2: UI Connect Arrow -->
  <g>
    <path d="M 275 200 L 325 200" class="arrow" />
    <polygon points="325,195 335,200 325,205" class="arrow-head" />
  </g>

  <!-- ================= SDK NODE ================= -->
  <g transform="translate(380, 200)" filter="url(#glow)">
    <!-- SDK Box Shape -->
    <rect x="-45" y="-35" width="90" height="70" rx="10" fill="url(#nodeGradient)" />
    <!-- SDK Text -->
    <text x="0" y="-8" text-anchor="middle" class="title" font-size="16">Mesa</text>
    <text x="0" y="16" text-anchor="middle" class="title" font-size="16">SDK</text>
  </g>

  <!-- Flow 3: Deploy Arrow -->
  <g>
    <path d="M 440 200 L 510 200" class="arrow" />
    <polygon points="510,195 520,200 510,205" class="arrow-head" />
    <text x="475" y="185" text-anchor="middle" class="action-text">Deploy</text>
  </g>

  <!-- ================= STELLAR CLOUD ================= -->
  <g transform="translate(640, 200)" filter="url(#accentGlow)">
    <!-- Cloud Background Shape -->
    <path d="M -90 -20 
             A 45 45 0 0 1 -30 -70 
             A 60 60 0 0 1 70 -50 
             A 45 45 0 0 1 95 10 
             A 45 45 0 0 1 50 65 
             L -50 65 
             A 45 45 0 0 1 -90 -20 Z" 
          fill="#1e1b4b" stroke="#312e81" stroke-width="3" />
    
    <!-- Stellar Cloud Label -->
    <text x="0" y="-75" text-anchor="middle" class="title" fill="#a5b4fc">Stellar Cloud</text>

    <!-- Three Circles Inside (Chamas) -->
    <!-- Circle 1 -->
    <circle cx="-35" cy="15" r="22" fill="url(#accentGradient)" opacity="0.85"/>
    <text x="-35" y="19" text-anchor="middle" class="circle-label">Save</text>

    <!-- Circle 2 -->
    <circle cx="25" cy="20" r="22" fill="url(#accentGradient)" opacity="0.85"/>
    <text x="25" y="24" text-anchor="middle" class="circle-label">Save</text>

    <!-- Circle 3 -->
    <circle cx="-5" cy="-25" r="22" fill="url(#accentGradient)" opacity="0.85"/>
    <text x="-5" y="-21" text-anchor="middle" class="circle-label">Save</text>
  </g>
</svg>
