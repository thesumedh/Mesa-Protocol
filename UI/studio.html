<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Mesa Studio | Stellar Visual Workflow & App Builder</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Geist:wght@500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(10, 12, 16, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .node-card {
            user-select: none;
            touch-action: none;
        }
        .node-active {
            box-shadow: 0 0 20px rgba(0, 219, 233, 0.4);
            border-color: #00dbe9 !important;
        }
        .dot-grid {
            background-color: #040608;
            background-image: radial-gradient(circle, #272a2e 1px, transparent 1px);
            background-size: 24px 24px;
        }
        .node-port {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #040608;
            border: 2px solid #00dbe9;
            position: absolute;
            z-index: 10;
        }
        .node-port:hover {
            background: #00dbe9;
            transform: scale(1.3);
        }
        @keyframes pulse-cyan {
            0% { box-shadow: 0 0 0 0 rgba(0, 219, 233, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(0, 219, 233, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 219, 233, 0); }
        }
        .status-led {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #00dbe9;
            animation: pulse-cyan 2s infinite;
        }
        .code-block {
            background: #000000;
            border: 1px solid #272a2e;
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-background": "#e0e2e8",
                        "background": "#040608",
                        "surface": "#0a0c10",
                        "primary": "#dbfcff",
                        "primary-container": "#00f0ff",
                        "on-primary": "#00363a",
                        "outline": "#849495",
                        "outline-variant": "#272a2e",
                        "on-surface-variant": "#b9cacb"
                    },
                    "fontFamily": {
                        "headline-md": ["Geist"],
                        "body-md": ["Inter"],
                        "label-mono": ["JetBrains Mono"]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background font-body-md selection:bg-primary-container/30 overflow-hidden flex flex-col h-screen">
    <!-- TopNavBar -->
    <header class="h-16 w-full z-50 bg-background/80 backdrop-blur-xl border-b border-outline-variant/30 flex justify-between items-center px-6 shrink-0">
        <div class="flex items-center gap-6">
            <a href="index.html" class="font-headline-md text-primary tracking-tighter font-bold flex items-center gap-2">
                <span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings: 'FILL' 1;">layers</span>
                Mesa Studio
            </a>
            <div class="h-6 w-px bg-outline-variant/30"></div>
            <div class="flex items-center gap-2">
                <span class="text-on-surface-variant font-label-mono text-xs uppercase tracking-widest">Flow:</span>
                <input id="flow-name-input" type="text" oninput="updateFlowName(this.value)" class="bg-transparent font-headline-md text-on-surface text-base font-bold outline-none border-b border-transparent focus:border-primary px-1" value="Stellar Payment Flow"/>
            </div>
            <!-- Preset Template Selector -->
            <div class="flex items-center gap-2 bg-surface border border-outline-variant/40 rounded-lg px-3 py-1 text-xs">
                <span class="material-symbols-outlined text-primary text-sm">space_dashboard</span>
                <select id="template-select" onchange="loadTemplate(this.value)" class="bg-transparent text-on-surface font-label-mono outline-none cursor-pointer">
                    <option value="" disabled selected>Load Stellar Template...</option>
                    <option value="remittance">🌍 Cross-Border Remittance Corridor</option>
                    <option value="ngo">🤝 NGO Aid Payout Corridor</option>
                    <option value="escrow">🔒 Savings Circle / Escrow App</option>
                    <option value="payroll">💼 Automated Stellar Payroll</option>
                    <option value="soroban">⚡ Soroban Yield Vault</option>
                </select>
            </div>
        </div>

        <!-- Action Controls -->
        <div class="flex items-center gap-3">
            <div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-surface border border-outline-variant/30 text-xs text-on-surface-variant font-label-mono">
                <div class="status-led"></div>
                <span>Engine Active</span>
            </div>
            <button onclick="openImportModal()" class="flex items-center gap-2 px-4 py-2 rounded-lg bg-surface hover:bg-outline-variant/30 text-on-surface border border-outline-variant/40 text-xs font-headline-md font-semibold transition">
                <span class="material-symbols-outlined text-sm">code</span>
                Import Code
            </button>
            <button onclick="downloadStarterZip()" class="flex items-center gap-2 px-5 py-2 rounded-lg bg-primary-container hover:bg-primary text-on-primary font-headline-md font-bold text-xs shadow-lg shadow-primary-container/20 transition">
                <span class="material-symbols-outlined text-sm">download</span>
                Export App Starter
            </button>
        </div>
    </header>

    <!-- Main Studio Workspace -->
    <div class="flex-1 flex overflow-hidden relative">
        <!-- Sidebar Palette -->
        <aside class="w-64 bg-surface/90 border-r border-outline-variant/30 flex flex-col p-4 gap-4 z-20 shrink-0">
            <div>
                <h3 class="text-xs font-label-mono text-outline uppercase tracking-wider mb-3">Node Palette</h3>
                <div class="flex flex-col gap-2">
                    <button onclick="addNode('receive')" class="flex items-center justify-between p-3 rounded-lg bg-background border border-outline-variant/40 hover:border-primary/50 text-left transition group">
                        <div class="flex items-center gap-3">
                            <span class="material-symbols-outlined text-primary text-xl">payments</span>
                            <div>
                                <div class="text-xs font-headline-md font-semibold text-on-surface">Receive Payment</div>
                                <div class="text-[10px] text-outline">Listen for incoming XLM/USDC</div>
                            </div>
                        </div>
                        <span class="material-symbols-outlined text-outline group-hover:text-primary text-sm">add</span>
                    </button>

                    <button onclick="addNode('delay')" class="flex items-center justify-between p-3 rounded-lg bg-background border border-outline-variant/40 hover:border-primary/50 text-left transition group">
                        <div class="flex items-center gap-3">
                            <span class="material-symbols-outlined text-primary text-xl">schedule</span>
                            <div>
                                <div class="text-xs font-headline-md font-semibold text-on-surface">Compliance Delay</div>
                                <div class="text-[10px] text-outline">Hold window for compliance</div>
                            </div>
                        </div>
                        <span class="material-symbols-outlined text-outline group-hover:text-primary text-sm">add</span>
                    </button>

                    <button onclick="addNode('payment')" class="flex items-center justify-between p-3 rounded-lg bg-background border border-outline-variant/40 hover:border-primary/50 text-left transition group">
                        <div class="flex items-center gap-3">
                            <span class="material-symbols-outlined text-primary text-xl">send</span>
                            <div>
                                <div class="text-xs font-headline-md font-semibold text-on-surface">Stellar Payment</div>
                                <div class="text-[10px] text-outline">Submit transaction on Horizon</div>
                            </div>
                        </div>
                        <span class="material-symbols-outlined text-outline group-hover:text-primary text-sm">add</span>
                    </button>

                    <button onclick="addNode('sep10')" class="flex items-center justify-between p-3 rounded-lg bg-background border border-outline-variant/40 hover:border-primary/50 text-left transition group">
                        <div class="flex items-center gap-3">
                            <span class="material-symbols-outlined text-primary text-xl">key</span>
                            <div>
                                <div class="text-xs font-headline-md font-semibold text-on-surface">SEP-10 Auth</div>
                                <div class="text-[10px] text-outline">Authenticate user / anchor session</div>
                            </div>
                        </div>
                        <span class="material-symbols-outlined text-outline group-hover:text-primary text-sm">add</span>
                    </button>

                    <button onclick="addNode('anchor')" class="flex items-center justify-between p-3 rounded-lg bg-background border border-outline-variant/40 hover:border-primary/50 text-left transition group">
                        <div class="flex items-center gap-3">
                            <span class="material-symbols-outlined text-primary text-xl">account_balance</span>
                            <div>
                                <div class="text-xs font-headline-md font-semibold text-on-surface">Anchor Deposit</div>
                                <div class="text-[10px] text-outline">SEP-24 Interactive webview deposit</div>
                            </div>
                        </div>
                        <span class="material-symbols-outlined text-outline group-hover:text-primary text-sm">add</span>
                    </button>

                    <button onclick="addNode('path-payment')" class="flex items-center justify-between p-3 rounded-lg bg-background border border-outline-variant/40 hover:border-primary/50 text-left transition group">
                        <div class="flex items-center gap-3">
                            <span class="material-symbols-outlined text-primary text-xl">swap_horiz</span>
                            <div>
                                <div class="text-xs font-headline-md font-semibold text-on-surface">Path Payment / Swap</div>
                                <div class="text-[10px] text-outline">Convert asset via Stellar DEX</div>
                            </div>
                        </div>
                        <span class="material-symbols-outlined text-outline group-hover:text-primary text-sm">add</span>
                    </button>

                    <button onclick="addNode('soroban')" class="flex items-center justify-between p-3 rounded-lg bg-background border border-outline-variant/40 hover:border-primary/50 text-left transition group">
                        <div class="flex items-center gap-3">
                            <span class="material-symbols-outlined text-primary text-xl">code</span>
                            <div>
                                <div class="text-xs font-headline-md font-semibold text-on-surface">Soroban Invocation</div>
                                <div class="text-[10px] text-outline">Invoke Soroban contract method</div>
                            </div>
                        </div>
                        <span class="material-symbols-outlined text-outline group-hover:text-primary text-sm">add</span>
                    </button>

                    <button onclick="addNode('approval')" class="flex items-center justify-between p-3 rounded-lg bg-background border border-outline-variant/40 hover:border-primary/50 text-left transition group">
                        <div class="flex items-center gap-3">
                            <span class="material-symbols-outlined text-primary text-xl">gavel</span>
                            <div>
                                <div class="text-xs font-headline-md font-semibold text-on-surface">Manual Approval</div>
                                <div class="text-[10px] text-outline">Pause for operator sign-off</div>
                            </div>
                        </div>
                        <span class="material-symbols-outlined text-outline group-hover:text-primary text-sm">add</span>
                    </button>

                    <button onclick="addNode('condition')" class="flex items-center justify-between p-3 rounded-lg bg-background border border-outline-variant/40 hover:border-primary/50 text-left transition group">
                        <div class="flex items-center gap-3">
                            <span class="material-symbols-outlined text-primary text-xl">alt_route</span>
                            <div>
                                <div class="text-xs font-headline-md font-semibold text-on-surface">Condition Branch</div>
                                <div class="text-[10px] text-outline">Evaluate expression route</div>
                            </div>
                        </div>
                        <span class="material-symbols-outlined text-outline group-hover:text-primary text-sm">add</span>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Canvas Area -->
        <main id="canvas-wrapper" class="flex-1 relative dot-grid overflow-auto p-12">
            <svg id="svg-connections" class="absolute inset-0 w-full h-full pointer-events-none z-10" style="min-width: 3000px; min-height: 2000px;"></svg>
            <div id="canvas-nodes" class="relative" style="min-width: 3000px; min-height: 2000px;"></div>
        </main>

        <!-- Properties & Live Code Generator Panel -->
        <aside class="w-96 bg-surface/90 border-l border-outline-variant/30 flex flex-col z-20 shrink-0">
            <div class="p-4 border-b border-outline-variant/30 flex justify-between items-center">
                <h3 class="text-xs font-label-mono text-outline uppercase tracking-wider">Node Properties</h3>
                <button onclick="deleteSelectedNode()" class="text-xs text-red-400 hover:text-red-300 font-label-mono flex items-center gap-1">
                    <span class="material-symbols-outlined text-sm">delete</span> Delete
                </button>
            </div>

            <div id="properties-panel" class="p-4 flex-1 overflow-y-auto space-y-4"></div>

            <!-- Live Code Preview Panel -->
            <div class="h-64 border-t border-outline-variant/30 bg-background flex flex-col">
                <div class="px-4 py-2 border-b border-outline-variant/30 flex justify-between items-center bg-surface/50">
                    <div class="flex items-center gap-3">
                        <span class="text-xs font-label-mono text-outline uppercase">Generated Output:</span>
                        <div class="flex gap-2">
                            <button id="tab-ts" onclick="setPreviewFormat('ts')" class="text-xs font-label-mono text-primary font-bold border-b-2 border-primary pb-0.5">TypeScript</button>
                            <button id="tab-json" onclick="setPreviewFormat('json')" class="text-xs font-label-mono text-outline hover:text-on-surface pb-0.5">JSON</button>
                            <button id="tab-curl" onclick="setPreviewFormat('curl')" class="text-xs font-label-mono text-outline hover:text-on-surface pb-0.5">cURL</button>
                        </div>
                    </div>
                    <button onclick="copyGeneratedCode()" class="text-xs font-label-mono text-primary hover:underline flex items-center gap-1">
                        <span class="material-symbols-outlined text-sm">content_copy</span> Copy
                    </button>
                </div>
                <pre class="flex-1 p-4 text-[11px] font-label-mono text-primary/90 overflow-auto code-block leading-relaxed"><code id="sdk-code-preview"></code></pre>
            </div>
        </aside>
    </div>

    <!-- Import Code Modal -->
    <div id="import-modal" class="hidden fixed inset-0 z-50 bg-black/70 backdrop-blur-md flex items-center justify-center p-6">
        <div class="bg-surface border border-outline-variant/40 rounded-xl w-full max-w-2xl p-6 shadow-2xl space-y-4">
            <div class="flex justify-between items-center">
                <h3 class="font-headline-md text-lg font-bold text-on-surface">Import TypeScript SDK Code</h3>
                <button onclick="closeImportModal()" class="text-outline hover:text-on-surface">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <p class="text-xs text-outline font-body-md">Paste any Mesa TypeScript SDK builder code below to parse and render onto the Studio visual canvas:</p>
            <textarea id="import-code-input" class="w-full h-48 bg-background border border-outline-variant/40 rounded-lg p-3 font-label-mono text-xs text-primary focus:border-primary outline-none" placeholder="import { Mesa } from '@mesaprotocol/sdk';&#10;&#10;const flow = Mesa.flow('remittance-corridor')&#10;  .receive({ asset: 'XLM', minAmount: 50, toAddress: 'GD3Z...KAOV' })&#10;  .delay({ seconds: 10 })&#10;  .payment({ amount: 45, to: 'GA4U...IW3P', senderSecretRef: 'SENDER_SECRET' })&#10;  .build();"></textarea>
            <div class="flex justify-end gap-3">
                <button onclick="closeImportModal()" class="px-4 py-2 rounded-lg text-xs font-headline-md text-outline hover:text-on-surface">Cancel</button>
                <button onclick="executeCodeImport()" class="px-5 py-2 rounded-lg bg-primary-container text-on-primary font-headline-md font-bold text-xs shadow-lg">Parse & Render Canvas</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-surface/90 border border-primary/40 px-4 py-2 rounded-lg text-xs font-label-mono text-primary flex items-center gap-2 shadow-xl transition-all duration-300 translate-y-20 opacity-0 z-50">
        <span class="material-symbols-outlined text-sm">check_circle</span>
        <span id="toast-text">Toast Message</span>
    </div>

    <script src="studio.js"></script>
</body>
</html>
